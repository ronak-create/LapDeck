name: Bug report
description: Something broken in the agent or the phone UI
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What did you do, what did you expect, what happened instead?
      placeholder: e.g. Two-finger scroll on the touchpad scrolls the wrong way in Excel…
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the Touchpad tab
        2. …
  - type: input
    id: windows
    attributes:
      label: Windows version
      placeholder: e.g. Windows 11 24H2
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version (`node -v`)
      placeholder: e.g. v22.11.0
    validations:
      required: true
  - type: input
    id: phone
    attributes:
      label: Phone + browser
      placeholder: e.g. Pixel 8, Chrome 126 (installed as PWA)
  - type: textarea
    id: logs
    attributes:
      label: Agent console output
      description: Anything the agent printed around the time of the bug (run `npm start` in a terminal to see it). Remove your pairing token if it appears in URLs.
      render: text
